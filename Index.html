
<!DOCTYPE html>
<html>
<head>
    <title>My First Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0078D4;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>Welcome to My First Azure Web App</h1>
<p>This is a simple static web app deployed from GitHub.</p>

<button onclick="showMessage()">Click Me</button>

<p id="message"></p>

<script>
function showMessage() {
    document.getElementById("message").innerHTML = "Hello! Your web app is working.";
}
</script>

</body>
</html>
